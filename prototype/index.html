<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>머지 가디언즈 — 코어 루프 프로토타입 v0.2</title>
<style>
  :root{
    --bg:#0e1220; --panel:#171c2e; --panel2:#1e2438; --line:#2a3150;
    --text:#e8e6df; --dim:#8a8fa8;
    --lightning:#ffd23f; --earth:#c08850; --fire:#ff5a3c; --frost:#55c8ff;
    --gold:#ffd23f; --danger:#ff5a3c;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'Noto Sans KR',sans-serif;
       display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px}
  #wrap{width:100%;max-width:440px}
  #hud{display:flex;justify-content:space-between;align-items:center;padding:6px 4px;
       font-variant-numeric:tabular-nums;font-size:14px}
  #hud b{font-size:16px}
  .res{display:flex;gap:12px}
  .res span::before{content:'◆';font-size:10px;margin-right:3px;vertical-align:1px}
  #gold::before{color:var(--gold)}
  #pollwrap{height:6px;background:var(--panel);border-radius:3px;overflow:hidden;margin:2px 0 6px}
  #pollbar{height:100%;width:0%;background:linear-gradient(90deg,#5a4a8a,var(--danger));transition:width .3s}
  canvas{width:100%;display:block;background:#0a0e19;border:1px solid var(--line);border-radius:8px;touch-action:manipulation}
  #info{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 10px;
        margin-top:6px;min-height:58px;font-size:12.5px;line-height:1.55}
  #info .name{font-weight:700;font-size:14px}
  #info .chip{display:inline-block;padding:1px 7px;border-radius:9px;font-size:10.5px;
              margin-left:6px;vertical-align:1px;color:#0e1220;font-weight:700}
  #info .stats{color:var(--dim);font-variant-numeric:tabular-nums}
  #msg{min-height:18px;font-size:12px;color:var(--dim);padding:4px;text-align:center}
  #controls{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  button{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;
         padding:10px 4px;font-size:13px;font-family:inherit;cursor:pointer}
  button:active{transform:translateY(1px)} button:disabled{opacity:.35}
  button.gold{border-color:var(--gold)}
  #lineages{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px}
  #lineages button{padding:8px 2px;font-size:11.5px;line-height:1.5}
  #lin0{border-color:var(--lightning)} #lin1{border-color:var(--earth)}
  #lin2{border-color:var(--fire)} #lin3{border-color:var(--frost)}
  #overlay{position:fixed;inset:0;background:rgba(10,14,25,.92);display:none;
           flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px}
  #overlay h1{font-size:26px;letter-spacing:.06em} #overlay p{color:var(--dim);line-height:1.8}
  #overlay button{padding:12px 28px;font-size:15px}
  .tag{font-size:11px;color:var(--dim)}
  #linhelp{text-align:center;margin-top:8px;line-height:1.5}
  #keyhelp{text-align:center;margin-top:6px;line-height:1.5;opacity:.8}
  #shophdr{text-align:center;margin-top:8px}
  #shop{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px}
  #shop button{padding:7px 2px;font-size:11px}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div><b id="round">R0</b>/40 <span id="wavetag" class="tag"></span></div>
    <div class="res"><span id="gold">150</span></div>
    <div><button id="speed" style="padding:4px 10px;font-size:12px">×1</button></div>
  </div>
  <div id="pollwrap"><div id="pollbar"></div></div>
  <canvas id="cv" width="420" height="580"></canvas>
  <div id="info"><span class="tag">타워를 탭하면 속성·티어·스킬이 여기 표시됩니다.</span></div>
  <div id="msg">뽑기 → 빈 타일을 탭해 배치하세요.</div>
  <div id="controls">
    <button id="draw" class="gold">뽑기 40</button>
    <button id="sell" disabled>판매</button>
  </div>
  <div id="shophdr" class="tag">지정 구매(골드) — 원하는 T1을 즉시 대기열로 · <b id="buyprice" style="color:var(--text)"></b></div>
  <div id="shop"></div>
  <div id="linhelp" class="tag">원소 강화(골드) — 해당 속성 타워 <b style="color:var(--text)">공격력 레벨당 ×1.03(복리)</b> · 대지=파쇄 방깎 +1%/Lv · 냉기=감속·분쇄·화포폭발↑</div>
  <div id="lineages">
    <button id="lin0">번개</button><button id="lin1">대지</button>
    <button id="lin2">화염</button><button id="lin3">냉기</button>
  </div>
  <div id="keyhelp" class="tag">단축키 — Space/D 뽑기·배치 · M 합성 · S 판매 · 1234 원소강화</div>
</div>
<div id="overlay">
  <h1 id="ovTitle"></h1><p id="ovBody"></p><button onclick="location.reload()">다시 도전</button>
</div>
<script>
'use strict';
// ───── 확정 밸런스 상수 (GA v0.4) ─────
// 프로토 체험 모드 밸런스. 문서 확정치는 HP_G=1.29.
const HP0=40, HP_G=1.22, ACC=1.06, ARM0=0.15, ARM_G=1.17;
// 프로토 체험용 경제 완화 (문서 확정치: 100+10r, 시작 150골드 — 합성 템포 검증 위해 ×1.6)
const REW_A=160, REW_B=16, DRAW=40;  // 프로토: 뽑기 40 (문서 60)
const KINDS=['속사수','저격수','화포','도트','빙결사','뇌격사','파쇄자','상인'];
const ELEM =[0,1,2,2,3,0,1,3];
const ENAME=['번개','대지','화염','냉기'];
const ECOL =['#ffd23f','#c08850','#ff5a3c','#55c8ff'];
const APSK =[2.0,0.4,0.8,1.0,1.0,1.0,1.0,0];
const BUDG =[1.0,1.1,0.6,0.8,0.4,0.5,0.4,0];
const KG   ={1:1,2:1,3:2,4:3,5:5,6:8};
const NAMES=[
 ['견습 사수','연발 사수','속사 명수','폭풍 사수','뇌운 사수','초월 · 뇌제'],
 ['견습 저격수','정찰 저격수','파성 저격수','처형자','산악 거포','초월 · 산왕'],
 ['소형 박격포','야전 화포','공성 화포','화염 곡사포','재앙 화포','초월 · 겁화룡'],
 ['불씨 술사','화상 술사','부식 술사','황금 두꺼비','역병 술사','초월 · 역병군주'],
 ['서리 견습생','한파 술사','빙하 술사','동토 술사','절대영도','초월 · 설왕'],
 ['정전기 술사','스파크 술사','낙뢰 술사','마비 술사','뇌정 술사','초월 · 뇌신'],
 ['균열 견습생','파암 술사','파쇄 술사','붕괴 술사','지진 술사','초월 · 지모신'],
 ['견습 상인','행상인','무역상','상단주','대상단주','초월 · 황금왕']];
const SKILL=[
 '빠른 공속 단일 공격. 타격당 감산 구조라 방어력에 가장 취약 — 방깎(파쇄자)과 최고 궁합.',
 '저속 초고딜 · 최장 사거리. 중갑·보스 특화, 잡몹전은 과잉딜 낭비.',
 '광역 폭발. 빙결사(감속) 보유 시 밀집 계수 상승 — 냉기 레벨이 폭발 효율을 키움.',
 '지속 피해 · 방어 완전 무시. 아머 인플레의 무과세 축.',
 '감속 + 동상 스택 부여, 5스택 시 분쇄 폭발(방어 무시) — 냉기 레벨이 분쇄 위력을 키움.',
 '타격 시 20% 확률 스턴 0.5초 (보스 면역). 저격수의 고정 시너지 파트너.',
 '범위 방깎 존 — 대지 레벨이 방깎량을 키움. 속사수의 필수 파트너.',
 '공격하지 않음. 몬스터 처치당 골드 획득. T1은 전액 환급 판매 가능 — 킵할지가 결정.'];
const SWARM=new Set([6,15,22,31]), FAST=new Set([8,17,27,35]), HEAVY=new Set([13,24,33]);
const BOSSDM={10:1.7,20:1.8,30:2.0,40:3.4};
const wHP=r=>HP0*Math.pow(HP_G,r)*(r>25?Math.pow(ACC,r-25):1);
const wARM=r=>ARM0*Math.pow(ARM_G,r);

// ───── S자 경로 (3레인 서펜타인) ─────
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
// 4레인 서펜타인 (레인 y=60·172·284·396, 출구는 좌하단으로 하강)
const wp=[[-14,60],[368,60],[368,172],[52,172],[52,284],[368,284],[368,396],[52,396],[52,660]];
const LEAK=[52,565];  // 화면 안 누출 표시 지점
let segLen=[],TOTAL=0;
for(let i=0;i<wp.length-1;i++){const l=Math.hypot(wp[i+1][0]-wp[i][0],wp[i+1][1]-wp[i][1]);segLen.push(l);TOTAL+=l;}
function pathPos(d){ d=Math.max(0,Math.min(d,TOTAL));
  for(let i=0;i<segLen.length;i++){ if(d<=segLen[i]){const t=d/segLen[i];
    return [wp[i][0]+(wp[i+1][0]-wp[i][0])*t, wp[i][1]+(wp[i+1][1]-wp[i][1])*t];}
    d-=segLen[i];} return wp[wp.length-1];}
// 타일: 레인 사이 포켓 3줄 + 4레인 아래 개활지 3줄 = 6행 × 6열 = 36칸
const SLOTS=[];
for(const y of [116,228,340,445,500,555]) for(let i=0;i<6;i++) SLOTS.push({x:84+i*51,y,tower:null});

// ───── 상태 ─────
const S={gold:300,poll:0,debuff:1,lin:[0,0,0,0],round:0,phase:'prep',
         prepT:2,waveT:0,spawned:0,toSpawn:0,killed:0,paidWave:0,speed:1,
         sel:null,pending:null,over:false,buys:0,golden:new WeakSet()};
let enemies=[],shots=[],floats=[];
const $=id=>document.getElementById(id);
function msg(t){$('msg').textContent=t;}

// ───── 티어 파워 커브 (가속 지수: 고티어일수록 배수가 더 커짐) ─────
const TIERP =[1, 2.5, 7, 21, 70, 280];        // 티어별 공격력/DPS 기본 배수
const RAPID =[1, 1.25, 1.6, 2.05, 2.6, 3.3];  // 속사수 공속 배수(티어)
const SHRED_T=[3, 8, 20, 50, 130, 340];        // 파쇄자 방깎량(티어)
const PIERCE =[1, 2, 3, 5, 7, 12];             // 저격수 관통 대상 수(티어)
const SHAT_THR=[5, 5, 4, 4, 3, 3];             // 빙결사 분쇄 발동 스택(티어)
const RNG_G  =[8, 8, 9, 7, 9, 9, 16, 0];       // 종류별 사거리 성장/티어
const RBASE  =[90,170,110,120,105,110,100,0];  // 종류별 기본 사거리
// ───── 타워 수치 ─────
function towerDmg(t){const b=6*BUDG[t.kind]*TIERP[t.tier-1]*Math.pow(1.03,S.lin[ELEM[t.kind]]);
  return b/(APSK[t.kind]||1);}
function atkSpeed(t){return APSK[t.kind]*(t.kind===0?RAPID[t.tier-1]:1);} // 초당 공격 횟수(속사수 램프)
function towerRange(t){return RBASE[t.kind]+(t.tier-1)*RNG_G[t.kind];}
function splashR(t){return 30+(t.tier-1)*11;}   // 화포 폭발 반경
function dotDur(t){return 5+t.tier;}            // 도트 지속(초)
function stunChance(t){return 0.12+0.06*t.tier;}// 뇌격사 스턴 확률
function stunDur(t){return 0.4+0.12*t.tier;}    // 뇌격사 스턴 지속
// 티어 시그니처 한 줄 설명(정보 패널용)
function tierTip(t){switch(t.kind){
  case 0:return `공속 ×${RAPID[t.tier-1].toFixed(2)} → 초당 ${atkSpeed(t).toFixed(1)}발`;
  case 1:return `관통 ${PIERCE[t.tier-1]}체 (일직선 다중타격)`;
  case 2:return `폭발 반경 ${splashR(t)}`;
  case 3:return `지속 ${dotDur(t)}s · 방어 완전 무시`;
  case 4:return `분쇄 ${SHAT_THR[t.tier-1]}스택`;
  case 5:return `스턴 ${Math.round(stunChance(t)*100)}% · ${stunDur(t).toFixed(1)}s`;
  case 6:return `방깎 ${Math.round(SHRED_T[t.tier-1]*(1+0.01*S.lin[1]))}${t.tier>=5?' · T5+ 중복누적·장갑파괴 증폭':''}`;
  default:return '';}}
function showInfo(t,pendingMode){
  const el=ELEM[t.kind],col=ECOL[el];
  const dps=t.kind===7?0:(towerDmg(t)*APSK[t.kind]).toFixed(0);
  let stats=t.kind===7
    ? `처치당 +${KG[t.tier]}골드${S.golden.has(t)?' ×2 (황금!)':''}`
    : `공격력 ${towerDmg(t).toFixed(1)} · 공속 ${APSK[t.kind]}/s · 사거리 ${towerRange(t)} · DPS ${dps}`;
  $('info').innerHTML=`<span class="name">T${t.tier} ${NAMES[t.kind][t.tier-1]}</span>`+
    `<span class="chip" style="background:${col}">${ENAME[el]}</span>`+
    (pendingMode?`<span class="chip" style="background:#8a8fa8">배치 대기</span>`:'')+
    `<br><span class="stats">${stats}</span><br>${SKILL[t.kind]}`;
}
function clearInfo(){$('info').innerHTML='<span class="tag">타워를 탭하면 속성·티어·스킬이 여기 표시됩니다.</span>';}

// ───── 뽑기 · 배치 · 합성 · 판매 ─────
function rollTower(){
  if(S.pending)return msg('먼저 빈 타일을 탭해 배치하세요.');
  if(S.gold<DRAW)return msg('골드가 부족합니다.');
  if(!SLOTS.some(s=>!s.tower))return msg('빈 타일이 없습니다 — 합성이나 판매로 정리하세요.');
  S.gold-=DRAW;
  const k=Math.floor(Math.random()*8);
  const t={kind:k,tier:1,cool:0};
  if(k===7&&Math.random()<0.10)S.golden.add(t);
  S.pending=t;S.sel=null;$('sell').disabled=true;
  showInfo(t,true);
  msg(`${KINDS[k]} 등장! 빈 타일을 탭해 배치하세요.${k===7?' (원치 않으면 배치 후 전액 환급 판매)':''}`);
  $('draw').disabled=true;
}
// 지정 구매: 원하는 T1을 확정으로 얻는 만큼 라운드와 사용 횟수에 따라 비선형으로 비싸진다.
function buyCost(){return Math.floor(100+4*S.round+0.35*S.round*S.round+20*S.buys+3*S.buys*S.buys);}
function buyTower(k){
  if(S.pending)return msg('먼저 대기 중인 타워를 배치하세요.');
  const c=buyCost();
  if(S.gold<c)return msg(`골드 부족 — ${KINDS[k]} 지정 구매에 ${c}골드 필요 (보유 ${Math.floor(S.gold)})`);
  if(!SLOTS.some(s=>!s.tower))return msg('빈 타일이 없습니다 — 합성이나 판매로 정리하세요.');
  S.gold-=c;
  S.buys++;
  const t={kind:k,tier:1,cool:0};
  if(k===7&&Math.random()<0.10)S.golden.add(t);
  S.pending=t;S.sel=null;$('sell').disabled=true;
  showInfo(t,true);
  msg(`${KINDS[k]} 지정 구매(−${c})! 빈 타일을 탭해 배치하세요.`);
}
function tryMerchantMerge(){
  for(let tier=1;tier<=5;tier++){
    const ms=SLOTS.filter(s=>s.tower&&s.tower.kind===7&&s.tower.tier===tier);
    if(ms.length>=2){ms[1].tower=null;
      const t={kind:7,tier:tier+1,cool:0};
      if(Math.random()<0.10)S.golden.add(t);
      ms[0].tower=t;msg(`상인 합성 → T${tier+1} ${NAMES[7][tier]}`);return tryMerchantMerge();}}}
function tapSlot(slot){
  if(S.pending){
    if(slot.tower)return msg('빈 타일을 선택하세요.');
    slot.tower=S.pending;S.pending=null;$('draw').disabled=false;
    if(slot.tower.kind===7)tryMerchantMerge();
    clearInfo();msg('배치 완료.');return;}
  const t=slot.tower;
  if(S.sel&&S.sel!==slot&&t&&S.sel.tower&&t.kind===S.sel.tower.kind&&t.tier===S.sel.tower.tier&&t.tier<=5&&t.kind!==7){
    const nt={kind:Math.floor(Math.random()*7),tier:t.tier+1,cool:0};
    slot.tower=null;S.sel.tower=nt;
    msg(`합성! → T${nt.tier} ${NAMES[nt.kind][nt.tier-1]}${nt.tier===6?' ★초월★':''}`);
    showInfo(nt);S.sel=null;$('sell').disabled=true;return;}
  S.sel=(t&&S.sel!==slot)?slot:null;
  $('sell').disabled=!S.sel;
  if(S.sel){showInfo(S.sel.tower);
    const st=S.sel.tower;
    const price=st.kind===7&&st.tier===1?DRAW:(st.tier>=5?0:DRAW/2*Math.pow(2,st.tier-1));
    msg(st.tier>=5?'T5 이상은 매각 불가. 같은 타워 탭 = 합성':`판매 ${price}골드 · 같은 타워 탭 = 합성`);}
  else clearInfo();
}
$('sell').onclick=()=>{if(!S.sel)return;const t=S.sel.tower;
  if(t.tier>=5)return msg('T5 이상은 매각할 수 없습니다.');
  const price=t.kind===7&&t.tier===1?DRAW:DRAW/2*Math.pow(2,t.tier-1);
  S.gold+=price;S.sel.tower=null;S.sel=null;$('sell').disabled=true;clearInfo();
  msg(`판매 +${price}골드${t.kind===7&&t.tier===1?' (상인 T1 전액 환급)':''}`);};
$('draw').onclick=rollTower;$('draw').textContent='뽑기 '+DRAW+' [Space]';
function linCost(i){
  const total=S.lin.reduce((a,b)=>a+b,0);
  return Math.floor(50+S.lin[i]*8+total*2);
}
function elemMult(lv){return Math.pow(1.03,lv);}  // 공격력 배수(레벨당 ×1.03 복리)
const LIN_EXTRA=['',' · 파쇄자 방깎 +1%/Lv','',' · 감속·분쇄·화포폭발 강화'];
// 원소 강화는 골드를 직접 소비한다. 후반 잉여 골드의 핵심 소모처.
function upgradeLin(i){const c=linCost(i);
  if(S.gold<c)return msg(`골드 부족 — ${ENAME[i]} 원소 강화에 ${c}골드 필요 (보유 ${Math.floor(S.gold)})`);
  const before=elemMult(S.lin[i]);
  S.gold-=c;S.lin[i]++;
  const after=elemMult(S.lin[i]);
  msg(`${ENAME[i]} 원소 Lv${S.lin[i]} — ${ENAME[i]} 타워 공격력 ×${before.toFixed(2)} → ×${after.toFixed(2)} (누적 +${Math.round((after-1)*100)}%)${LIN_EXTRA[i]}`);}
for(let i=0;i<4;i++)$('lin'+i).onclick=()=>upgradeLin(i);
// 상점 버튼 8종 동적 생성
const shopEl=$('shop');
KINDS.forEach((nm,k)=>{const b=document.createElement('button');
  b.textContent=nm;b.onclick=()=>buyTower(k);shopEl.appendChild(b);});
$('speed').onclick=()=>{S.speed=S.speed===1?2:S.speed===2?4:1;$('speed').textContent='×'+S.speed;};
cv.addEventListener('pointerdown',e=>{
  const r=cv.getBoundingClientRect(),sc=420/r.width;
  const x=(e.clientX-r.left)*sc,y=(e.clientY-r.top)*sc;
  let best=null,bd=1e9;
  for(const s of SLOTS){const d=Math.hypot(s.x-x,s.y-y);if(d<25&&d<bd){bd=d;best=s;}}
  if(best)tapSlot(best);});

// ───── 키보드 단축키 ─────
// 뽑기 대기 중이면 Space/D 로 첫 빈 타일에 자동 배치, 아니면 뽑기
function drawOrPlace(){
  if(S.pending){const empty=SLOTS.find(s=>!s.tower);
    if(empty)tapSlot(empty);else msg('빈 타일이 없습니다 — 합성이나 판매로 정리하세요.');return;}
  rollTower();}
// 선택한 타워와 같은 종류·티어 짝을 자동으로 찾아 합성
function quickMerge(){
  if(!S.sel||!S.sel.tower)return msg('합성할 타워를 먼저 탭/선택하세요.');
  const s=S.sel.tower;
  if(s.kind===7)return msg('상인은 배치 시 자동 합성됩니다.');
  if(s.tier>5)return msg('T5 이상은 합성할 수 없습니다.');
  const partner=SLOTS.find(o=>o!==S.sel&&o.tower&&o.tower.kind===s.kind&&o.tower.tier===s.tier);
  if(!partner)return msg('같은 종류·티어의 합성 짝이 없습니다.');
  tapSlot(partner);}
window.addEventListener('keydown',e=>{
  if(S.over||e.metaKey||e.ctrlKey||e.altKey)return;
  const k=e.key.toLowerCase();
  if(k===' '||k==='d'){e.preventDefault();drawOrPlace();}
  else if(k==='m'||k==='enter'){quickMerge();}
  else if(k==='s'){if(!$('sell').disabled)$('sell').onclick();}
  else if(k>='1'&&k<='4'){upgradeLin(+k-1);}});

// ───── 웨이브 ─────
function startRound(){
  S.round++;S.phase='wave';S.waveT=0;S.spawned=0;S.killed=0;S.paidWave=0;
  const r=S.round;
  S.mobN=Math.min(30,12+3*r);
  S.special=HEAVY.has(r)?'중갑':FAST.has(r)?'신속':SWARM.has(r)?'쇄도':(BOSSDM[r]?'보스':null);
  S.toSpawn=BOSSDM[r]?1:(S.special==='쇄도'?S.mobN*2:S.mobN);
  S.rewardPool=REW_A+REW_B*r;
  S.pollSnapshot=S.poll;
  $('wavetag').textContent=S.special?`[${S.special}]`:'';
  $('round').textContent='R'+r;
}
function spawnEnemy(){
  const r=S.round;let hp=wHP(r),spd=42,arm=wARM(r),weight=1;
  if(BOSSDM[r]){hp*=S.mobN*BOSSDM[r]*0.55;spd=24;arm*=2;weight=8;}
  else if(S.special==='쇄도'){hp*=0.55;weight=1.5;}
  else if(S.special==='신속'){spd*=1.4;weight=1.5;}
  else if(S.special==='중갑'){hp*=1.15;arm*=4;spd*=0.85;weight=1.5;}
  enemies.push({d:0,hp,maxhp:hp,spd,arm,weight,slow:0,stun:0,dot:0,dotT:0,stacks:0,boss:!!BOSSDM[r]});
}
function onKill(e){
  S.killed++;
  // 웨이브 보상 킬 분할 지급 + 상인 킬골드
  const share=Math.floor(S.rewardPool/S.toSpawn);
  let kg=0;for(const sl of SLOTS){const t=sl.tower;if(t&&t.kind===7)kg+=KG[t.tier]*(S.golden.has(t)?2:1);}
  const g=(e.boss?S.rewardPool:share)+Math.min(kg,8);
  S.gold+=g;S.paidWave+=e.boss?S.rewardPool:share;
  const[x,y]=pathPos(e.d);floats.push({x,y,txt:'+'+g,life:0.8,c:'#ffd23f'});
}
function endRound(){
  const r=S.round;let m='';
  const rest=Math.max(0,Math.floor(S.rewardPool*(S.killed/S.toSpawn))-S.paidWave);
  if(rest>0)S.gold+=rest;
  if({9:150,18:250,27:350,36:450}[r]){const b={9:150,18:250,27:350,36:450}[r];S.gold+=b;m+=` 킬업적 +${b}`;}
  if(BOSSDM[r]&&S.killed>=S.toSpawn*0.6){S.gold+=300;m+=' 보스 보상 +300골드';
    if(S.poll===S.pollSnapshot){S.gold+=250;m+=' 무피해 리베이트 +250골드!';}}
  msg(`R${r} 종료${m}`);
  if(r>=40){finish(true);return;}
  S.phase='prep';S.prepT=2.5;
}
function finish(clear){
  S.over=true;$('overlay').style.display='flex';
  $('ovTitle').textContent=clear?'클리어 — 사건 달성':'기록: R'+S.round;
  $('ovBody').innerHTML=(clear?'40라운드 완주. 설계 클리어율 0.48%의 판을 뽑았습니다.':
    '오염 100% 도달.<br>도달 라운드가 이 판의 기록입니다.')+
    '<br><br>합성 손맛 · 상인 킵 판단 · 원소 배분 감각을 메모해두세요.';
}

// ───── 전투 ─────
function shredAt(e){let s=0;
  for(const sl of SLOTS){const t=sl.tower;if(!t||t.kind!==6)continue;
    if(dist(sl,e)<=towerRange(t))s=Math.max(s,2*Math.pow(2,t.tier-1)*(1+0.01*S.lin[1]));}
  return s;}
function dist(sl,e){const[x,y]=pathPos(e.d);return Math.hypot(sl.x-x,sl.y-y);}
function hitEnemy(e,dmg,opts={}){
  const a=opts.trueDmg?0:Math.max(0,e.arm-(opts.shred??shredAt(e)));
  e.hp-=Math.max(1,dmg-a)*S.debuff;}
function update(dt){
  if(S.over)return;
  if(S.phase==='prep'){S.prepT-=dt;if(S.prepT<=0)startRound();return;}
  S.waveT+=dt;
  const spawnDur=BOSSDM[S.round]?0.1:14;
  while(S.spawned<S.toSpawn&&S.waveT>=S.spawned*(spawnDur/S.toSpawn)){spawnEnemy();S.spawned++;}
  for(const e of enemies){
    if(e.stun>0)e.stun-=dt;
    else e.d+=e.spd*(1-Math.min(0.6,e.slow))*dt;
    e.slow=Math.max(0,e.slow-dt*0.4);
    if(e.dot>0){e.hp-=e.dot*dt*S.debuff;e.dotT-=dt;if(e.dotT<=0)e.dot=0;}
  }
  for(const sl of SLOTS){const t=sl.tower;if(!t||t.kind===7)continue;
    t.cool-=dt;if(t.cool>0)continue;
    const rng=towerRange(t);
    let tgt=null,bp=-1;
    for(const e of enemies){if(e.hp<=0)continue;const d0=dist(sl,e);
      if(d0<=rng&&e.d>bp){bp=e.d;tgt=e;}}
    if(!tgt)continue;
    t.cool=1/APSK[t.kind];
    const dmg=towerDmg(t)*(t.tier===6?1.4:1);
    const[ex,ey]=pathPos(tgt.d);shots.push({x:sl.x,y:sl.y,ex,ey,c:ECOL[ELEM[t.kind]],life:.12});
    if(t.kind===2){
      const hasSlow=SLOTS.some(s=>s.tower&&s.tower.kind===4&&s.tower.tier>=2);
      const f=Math.min(1.5,0.75+(hasSlow?0.6*(1+S.lin[3]/200):0));
      for(const e of enemies){if(e.hp<=0)continue;
        const[x1,y1]=pathPos(e.d);if(Math.hypot(x1-ex,y1-ey)<=42)hitEnemy(e,dmg*f);}
    }else if(t.kind===3){tgt.dot=Math.max(tgt.dot,towerDmg(t));tgt.dotT=6;hitEnemy(tgt,dmg*0.3,{trueDmg:true});}
    else if(t.kind===4){
      tgt.slow=Math.min(0.6,tgt.slow+0.3+(t.tier-1)*0.06);
      hitEnemy(tgt,dmg*(0.35+0.45*Math.min(1,S.lin[3]/120))/0.4);
      tgt.stacks++;
      if(tgt.stacks>=5){tgt.stacks=0;
        hitEnemy(tgt,towerDmg(t)*5*(1+0.08*Math.floor(S.lin[3]/5)),{shred:1e9});
        shots.push({x:sl.x,y:sl.y,ex,ey,c:'#bfefff',life:.25});
        floats.push({x:ex,y:ey,txt:'분쇄!',life:0.7,c:'#bfefff'});}}
    else if(t.kind===5){hitEnemy(tgt,dmg);if(Math.random()<0.2&&!tgt.boss)tgt.stun=0.5+(t.tier-1)*0.1;}
    else hitEnemy(tgt,dmg);
  }
  const pw=S.special==='보스'?2:(S.special?1.5:1);
  enemies=enemies.filter(e=>{
    if(e.hp<=0){onKill(e);return false;}
    if(e.d>=TOTAL){S.poll+=e.weight*pw*(S.round<=5?0.5:1);S.killed++;
      floats.push({x:LEAK[0],y:LEAK[1],txt:'누출',life:0.8,c:'#ff5a3c'});return false;}
    return true;});
  for(const th of[25,50,75])if(S.poll>=th&&!S['ms'+th]){S['ms'+th]=1;S.debuff*=0.97;msg(`오염 ${th}% — 오염 지형 발생 (DPS −3%)`);}
  if(S.poll>=100){finish(false);return;}
  if(S.spawned>=S.toSpawn&&enemies.length===0&&S.phase==='wave')endRound();
  shots=shots.filter(s=>(s.life-=dt)>0);
  floats=floats.filter(f=>{f.life-=dt;f.y-=14*dt;return f.life>0;});
}
// ───── 렌더 ─────
function render(){
  cx.clearRect(0,0,420,580);
  // 배경 격자점
  cx.fillStyle='#141a2c';
  for(let x=20;x<420;x+=40)for(let y=20;y<580;y+=40){cx.fillRect(x,y,1.5,1.5);}
  // 경로
  cx.strokeStyle='#232a45';cx.lineWidth=26;cx.lineJoin='round';cx.lineCap='round';
  cx.beginPath();cx.moveTo(...wp[0]);for(let i=1;i<wp.length;i++)cx.lineTo(...wp[i]);cx.stroke();
  cx.strokeStyle='#2e3760';cx.lineWidth=2;cx.stroke();
  // 진행 화살표
  cx.fillStyle='#3d477a';
  for(let d=40;d<TOTAL;d+=90){const[x,y]=pathPos(d),[x2,y2]=pathPos(d+8);
    const ang=Math.atan2(y2-y,x2-x);
    cx.save();cx.translate(x,y);cx.rotate(ang);
    cx.beginPath();cx.moveTo(4,0);cx.lineTo(-3,-4);cx.lineTo(-3,4);cx.fill();cx.restore();}
  // 입구·출구
  cx.font='10px sans-serif';cx.textAlign='left';
  cx.fillStyle='#7ee08a';cx.fillText('▶ 진입',4,48);
  cx.fillStyle='#ff5a3c';cx.fillText('탈출 = 오염 ▼',62,540);
  // 타일·타워
  for(const sl of SLOTS){
    const placeable=S.pending&&!sl.tower;
    cx.fillStyle=sl===S.sel?'#2c3558':placeable?'#22305a':'#151a2c';
    cx.beginPath();cx.arc(sl.x,sl.y,22,0,7);cx.fill();
    if(placeable){cx.strokeStyle='#55c8ff';cx.globalAlpha=0.5+0.5*Math.sin(Date.now()/200);
      cx.lineWidth=1.5;cx.stroke();cx.globalAlpha=1;}
    const t=sl.tower;if(!t)continue;
    const col=t.kind===7?(S.golden.has(t)?'#ffe28a':'#9aa2c0'):ECOL[ELEM[t.kind]];
    for(let i=0;i<t.tier;i++){cx.strokeStyle=col;cx.globalAlpha=0.35+0.65*(i+1)/t.tier;
      cx.lineWidth=2;cx.beginPath();cx.arc(sl.x,sl.y,8+i*3.2,0,7);cx.stroke();}
    cx.globalAlpha=1;cx.fillStyle=col;
    cx.beginPath();cx.arc(sl.x,sl.y,6,0,7);cx.fill();
    cx.fillStyle='#0e1220';cx.font='bold 8px sans-serif';cx.textAlign='center';
    cx.fillText(t.tier===6?'★':t.tier,sl.x,sl.y+3);
    cx.fillStyle=col;cx.font='9px sans-serif';cx.fillText(KINDS[t.kind],sl.x,sl.y+34);
    // 합성 짝 존재 시 상시 표시점
    if(t.kind!==7&&t.tier<=5&&SLOTS.some(o=>o!==sl&&o.tower&&o.tower.kind===t.kind&&o.tower.tier===t.tier)){
      cx.fillStyle='#fff';cx.globalAlpha=0.5+0.4*Math.sin(Date.now()/300);
      cx.beginPath();cx.arc(sl.x+17,sl.y-17,3,0,7);cx.fill();cx.globalAlpha=1;}
    if(S.sel&&S.sel.tower&&sl!==S.sel&&t.kind===S.sel.tower.kind&&t.tier===S.sel.tower.tier&&t.tier<=5&&t.kind!==7){
      cx.strokeStyle='#fff';cx.globalAlpha=0.5+0.5*Math.sin(Date.now()/150);
      cx.lineWidth=2;cx.beginPath();cx.arc(sl.x,sl.y,25,0,7);cx.stroke();cx.globalAlpha=1;}
  }
  // 적
  for(const e of enemies){const[x,y]=pathPos(e.d);
    const R0=e.boss?13:5.5;
    cx.fillStyle=e.stun>0?'#ffd23f':(e.slow>0.05?'#7ec8e8':'#d95f6c');
    cx.beginPath();cx.arc(x,y,R0,0,7);cx.fill();
    cx.fillStyle='#0a0e19';cx.fillRect(x-9,y-R0-6,18,3);
    cx.fillStyle='#7ee08a';cx.fillRect(x-9,y-R0-6,18*Math.max(0,e.hp/e.maxhp),3);
    if(e.stacks>0){cx.fillStyle='#bfefff';cx.font='7px sans-serif';cx.textAlign='center';
      cx.fillText('❄'.repeat(Math.min(e.stacks,5)),x,y-R0-9);}}
  // 샷·플로팅 텍스트
  for(const s of shots){cx.strokeStyle=s.c;cx.globalAlpha=s.life/0.12;cx.lineWidth=1.5;
    cx.beginPath();cx.moveTo(s.x,s.y);cx.lineTo(s.ex,s.ey);cx.stroke();cx.globalAlpha=1;}
  for(const f of floats){cx.fillStyle=f.c;cx.globalAlpha=Math.min(1,f.life/0.4);
    cx.font='bold 10px sans-serif';cx.textAlign='center';cx.fillText(f.txt,f.x,f.y);cx.globalAlpha=1;}
  if(S.phase==='prep'&&!S.over){cx.fillStyle='#e8e6df';cx.font='bold 15px sans-serif';cx.textAlign='center';
    cx.fillText('다음 라운드 준비 중… R'+(S.round+1),210,290);}
}
function hud(){
  $('gold').textContent=Math.floor(S.gold);
  $('pollbar').style.width=S.poll+'%';
  const full=!SLOTS.some(s=>!s.tower);
  $('draw').disabled=!!S.pending||S.gold<DRAW;
  const bc=buyCost();
  $('buyprice').textContent='◆'+bc;
  for(const b of shopEl.children)b.disabled=!!S.pending||full||S.gold<bc;
  for(let i=0;i<4;i++){const c=linCost(i);
    $('lin'+i).disabled=S.gold<c;
    $('lin'+i).innerHTML=ENAME[i]+`<br><span class="tag">Lv${S.lin[i]} ×${elemMult(S.lin[i]).toFixed(2)} · 골드 ${c}</span>`;}
}
let last=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000);last=now;
  for(let i=0;i<S.speed;i++)update(dt);
  render();hud();requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
