    - text: 한번 열린 레벨은 계속 부를 수 있다 — 낮은 레벨은 안전하지만 보상(5·8·13·20·29·39)이 적다.
    - text: 빈 곳을 클릭하면 영웅이 이동한다. 타일을 클릭하면 유닛 생성/선택.
    - text: 단축키 — P 생성 · B 최고레벨 보스 · R 프로브 · X 처분 · 1234 업그레이드